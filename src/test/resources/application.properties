# Test configuration
spring.mvc.pathmatch.matching-strategy=ant_path_matcher

# Disable Swagger UI in tests to avoid path pattern issues
springdoc.swagger-ui.enabled=false

# Disable serverless auto-configuration for tests
spring.cloud.function.web.export-handler-beans=false

# Disable database-related features for testing
spring.flyway.enabled=false
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Use H2 in-memory database for tests
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Other test settings
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

# JWT configuration for tests
app.jwt.secret=MTIzNDU2Nzg5MEFCQ0RFRkdISUpLTE1OT1BRUlNUVVZXWFlaMDEyMzQ1Njc=
app.jwt.expiration=1800000
