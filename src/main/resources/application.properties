# Reduce logging level to make sure the application works with SAM local
# https://github.com/aws/serverless-java-container/issues/134

app.jwt.secret=MTIzNDU2Nzg5MEFCQ0RFRkdISUpLTE1OT1BRUlNUVVZXWFlaMDEyMzQ1Njc=
app.jwt.expiration=1800000

spring.application.name=demandlane-booklending

spring.datasource.username=${DB_USERNAME:booklending}
spring.datasource.password=${DB_PASSWORD:booklending123}
spring.datasource.url=jdbc:postgresql://${DB_HOST:database-1.cv44ss6gc3e4.ap-southeast-2.rds.amazonaws.com}:${DB_PORT:5432}/${DB_NAME:booklending}

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration

spring.mvc.pathmatch.matching-strategy=ant_path_matcher

springdoc.swagger-ui.enabled=false
springdoc.api-docs.enabled=false

management.endpoint.health.show-details=always
management.endpoint.metrics.enabled=true
management.endpoint.prometheus.enabled=true

management.endpoints.web.base-path=/actuator
management.endpoints.web.path-mapping.health=/health
management.endpoints.web.path-mapping.metrics=/metrics
management.endpoints.web.path-mapping.prometheus=/prometheus
management.endpoints.web.exposure.include=health,metrics,prometheus

management.health.ping.enabled=false
management.health.diskspace.enabled=false
management.health.db.enabled=false

# Use console logging for Lambda (CloudWatch handles the logs)
# File logging is disabled because Lambda has limited filesystem access
# logging.file.name=logs/app.log
logging.level.root=info
logging.level.org.springframework=info
logging.level.com.demandlane.booklending=debug